name: Publish to PyPI

# Publishes to PyPI when a GitHub Release is published (tag like v0.1.0).
# Uses PyPI "trusted publishing" (OIDC) -- no API tokens or secrets needed.
# One-time setup on PyPI is required: see the workflow notes / README.

on:
  release:
    types: [published]
  workflow_dispatch:        # allow a manual run from the Actions tab

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/jaxnu
    permissions:
      id-token: write       # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
